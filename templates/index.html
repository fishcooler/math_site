<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 数苗乐园 - 幼小衔接思维训练</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
</head>
<body>
    <div class="container">
        <!-- 背景装饰元素 -->
        <div class="bg-decoration">
            <span class="floating-emoji" style="top: 10%; left: 5%; animation-delay: 0s;">🌟</span>
            <span class="floating-emoji" style="top: 20%; right: 10%; animation-delay: 1s;">🎈</span>
            <span class="floating-emoji" style="bottom: 20%; left: 10%; animation-delay: 2s;">🦋</span>
            <span class="floating-emoji" style="bottom: 10%; right: 5%; animation-delay: 3s;">🌈</span>
            <span class="floating-emoji" style="top: 50%; left: 3%; animation-delay: 1.5s;">✨</span>
            <span class="floating-emoji" style="top: 40%; right: 8%; animation-delay: 2.5s;">🎯</span>
        </div>
        
        <div class="login-box">
            <!-- 品牌吉祥物 -->
            <div class="mascot">
                <span class="mascot-emoji">🌱</span>
                <span class="mascot-name">数苗苗</span>
            </div>
            
            <h1>🌈 数苗乐园</h1>
            <p class="subtitle">快乐学习，轻松成长！</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>👤 小朋友昵称</label>
                    <input type="text" id="username" placeholder="给自己起个酷酷的名字吧" required>
                </div>
                
                <div class="form-group">
                    <label>✨ 你的名字</label>
                    <input type="text" id="name" placeholder="告诉老师你叫什么" required>
                </div>
                
                <button type="submit" class="btn-primary">
                    开始探险 🚀
                </button>
            </form>
            
            <div class="features">
                <div class="feature-item">
                    <span class="feature-icon">🎯</span>
                    <span>30道趣味题</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🏆</span>
                    <span>成就徽章</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">⭐</span>
                    <span>积分奖励</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">📊</span>
                    <span>学习报告</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const name = document.getElementById('name').value;
            
            // 添加按钮加载状态
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ 准备中...';
            btn.disabled = true;
            
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `username=${encodeURIComponent(username)}&name=${encodeURIComponent(name)}`
            });
            
            const data = await response.json();
            if (data.success) {
                // 成功动画
                btn.innerHTML = '✅ 出发！';
                setTimeout(() => {
                    window.location.href = '/practice';
                }, 500);
            } else {
                alert(data.message || '登录失败');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
        
        // 输入框动画
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            input.addEventListener('blur', function() {
                this.parentElement.classList.remove('focused');
            });
        });
    </script>
    
    <style>
        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .floating-emoji {
            position: absolute;
            font-size: 30px;
            opacity: 0.3;
            animation: floatAround 6s ease-in-out infinite;
        }
        
        @keyframes floatAround {
            0%, 100% { 
                transform: translateY(0) rotate(0deg); 
                opacity: 0.3;
            }
            50% { 
                transform: translateY(-30px) rotate(20deg); 
                opacity: 0.6;
            }
        }
        
        /* 吉祥物 */
        .mascot {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .mascot-emoji {
            font-size: 60px;
            animation: mascotBounce 2s ease-in-out infinite;
        }
        
        @keyframes mascotBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }
        
        .mascot-name {
            font-size: 14px;
            color: var(--primary);
            font-weight: 600;
            margin-top: 5px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* 特性图标 */
        .feature-icon {
            display: block;
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 18px 12px;
        }
        
        /* 表单动画 */
        .form-group.focused label {
            color: var(--primary);
            transform: translateX(5px);
            transition: all 0.3s ease;
        }
        
        .form-group label {
            transition: all 0.3s ease;
        }
        
        /* 按钮悬停效果 */
        .btn-primary {
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-primary:hover::before {
            left: 100%;
        }
    </style>
</body>
</html>
